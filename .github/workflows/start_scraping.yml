name: start_scraping

# ၁၅ မိနစ်တစ်ကြိမ် Auto run ရန်နှင့် Manual run နိုင်ရန် သတ်မှတ်ခြင်း
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Repo အတွင်းသို့ ဖိုင်များပြန်လည် သိမ်းဆည်းနိုင်ရန် Permission ပေးခြင်း
permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scrapy

      - name: Run Scraper Script
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "Auto-update exam results and download PDFs" && git push)
